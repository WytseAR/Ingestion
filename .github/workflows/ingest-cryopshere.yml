name: Ingest Cryosphere data

on:
  schedule:
    - cron: "15 */4 * * *"
  workflow_dispatch:

jobs:
  run-ingest:
    runs-on: ubuntu-latest

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
      CRYOSPHERE_API_KEY: ${{ secrets.CRYOSPHERE_API_KEY }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests supabase

      - name: Run script
        run: python ingest_site_b.py

      - name: Run script
        run: python ingest_site_d.py
