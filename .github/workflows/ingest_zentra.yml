name: Ingest Zentra data

on:
  schedule:
    - cron: "15 */1 * * *" # "0 * * * *"   # elke uur
  workflow_dispatch:

jobs:
  run-ingest:
    runs-on: ubuntu-latest

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
      ZENTRA_API_TOKEN: ${{ secrets.ZENTRA_API_TOKEN }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests pandas supabase

      - name: Run Zentra ingest
        run: python ingest_zentra_SiteA.py
        
      - name: Run Zentra ingest
        run: python ingest_zentra_SiteC.py
        
